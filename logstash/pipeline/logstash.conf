#? =================================================================================
# *INPUT — Data source
# *The CSV file is read directly from the Logstash container
# *The local DATA folder is mounted as read-only in /data (see docker-compose)
#? =================================================================================

input {
    #
    file {
        # File path inside the Docker container
        # ./DATA on the host machine = /data in the container (mounted as :ro)
        path => "/data/movies.csv"

        # Re-read the csv file from the beginning on every Logstash restart
        start_position => "beginning"

        # using sincedb logstash keeps track of where it was last reading the file before it crashed/stopped
        sincedb_path => "/usr/share/logstash/logs/sincedb_movies"

        # Essential to handle special characters in titles
        codec => plain { charset => "UTF-8" }
    }
}

#? ===================================================================================================
# FILTER — Data parsing and basic type casting
# At this stage we keep the data as raw as possible (movies_raw index)
# Deep cleaning and normalization will be done in F3 (movies_clean)
#? ===================================================================================================
filter {
    # ---------------------------------------------------------------------------
    # STEP 1 — Parse each line as CSV
    # We define all 20 columns in the exact order they appear in the CSV file
    # ---------------------------------------------------------------------------
    csv {
        separator => ","
        # Some movie overviews contain commas inside the text
        # example: "A story about love, loss, and redemption in the heart of Paris"
        # quote_char tells the parser to treat values wrapped in double quotes as a single field, even if they contain commas inside
        quote_char => '"'
        columns => [
                    "id","title","genres","original_language",
                    "overview","popularity","production_companies",
                    "release_date","budget","revenue","runtime",
                    "status","tagline","vote_average","vote_count",
                    "credits","keywords","poster_path",
                    "backdrop_path","recommendations"
                    ]
        # Skip the header line of the CSV file
        skip_header => true
    }

    # ---------------------------------------------------------------------------
    # STEP 2 — Drop the header row if it slips through the CSV parser
    # This is a safety guard — the header line has "id" as a string value
    # ---------------------------------------------------------------------------
    if [id] == "id" { drop {} }

    # ---------------------------------------------------------------------------
    # STEP 3 — Type casting
    # We convert numeric fields from string to their correct types
    # ---------------------------------------------------------------------------
    mutate {
        convert => {
        "id"           => "integer"
        "popularity"   => "float"
        "budget"       => "float"
        "revenue"      => "float"
        "runtime"      => "float"
        "vote_average" => "float"
        "vote_count"   => "integer"
        }
        # If a numeric field is malformed in the CSV, the mutate filter fails silently.
        # We add tag_on_failure so that problematic rows are tagged and traceable in Elasticsearch.
        tag_on_failure => ["_mutate_convert_failure"]
    }

    # ---------------------------------------------------------------------------
    # STEP 4 — Parse release_date as a proper date field
    # ---------------------------------------------------------------------------
    date {
        match      => ["release_date", "yyyy-MM-dd"]
        # Write into @timestamp, not release_date — Kibana's time filter reads @timestamp.
        # Without this, every film appears at ingestion time and the films-per-year chart breaks.
        target     => "@timestamp"
        timezone   => "UTC"
        tag_on_failure => ["_date_parse_failure"]
    }

    # ---------------------------------------------------------------------------
    # STEP 5 — Remove Logstash internal metadata fields
    # These fields are added automatically by Logstash and are not useful
    # for our analysis in Elasticsearch
    # ---------------------------------------------------------------------------
    mutate {
        remove_field => ["@version", "host", "log", "event", "message"]
        # Same pattern as the other mutate blocks — keeps failures visible in ES.
        tag_on_failure => ["_remove_field_failure"]
    }

    # ---------------------------------------------------------------------------
    # STEP 6 — Clone event for movies_clean
    # We duplicate each event so one copy goes to movies_raw (untouched)
    # and one copy gets cleaned and routed to movies_clean.
    # add_field on the clone filter applies to the clone only — the original
    # never gets [@metadata][target] set, so the output conditional routes
    # each copy correctly without relying on [type] (broken in ECS v8).
    # ---------------------------------------------------------------------------
    clone {
        clones => ["movies_clean"]
        add_field => { "[@metadata][target]" => "movies_clean" }
    }

    # ---------------------------------------------------------------------------
    # STEP 7 — Drop incomplete records and strip clone metadata (movies_clean only)
    # Rows missing id or title are not useful for analysis.
    # We only drop from the clean copy — movies_raw keeps everything.
    # @version is re-added by Logstash when the clone filter creates a new event
    # even if it was removed in STEP 5 — remove it here before indexing.
    # ---------------------------------------------------------------------------
    if [@metadata][target] == "movies_clean" {
        if ![id] or [id] == "" or ![title] or [title] == "" {
            drop {}
        }
        mutate {
            remove_field => ["@version"]
            tag_on_failure => ["_remove_version_failure"]
        }
    }

    # ---------------------------------------------------------------------------
    # STEP 8 — Split dash-separated fields into arrays (movies_clean only)
    # genres, keywords, credits, and production_companies are stored as
    # dash-separated strings in the CSV (e.g. "Action-Comedy-Drama").
    # We split them into proper arrays for aggregations and filtering.
    # Known limitation: credits contains hyphenated names (e.g. Jean-Claude
    # Van Damme) — splitting on "-" will break those names. Documented.
    # ---------------------------------------------------------------------------
    if [@metadata][target] == "movies_clean" {
        mutate {
            split => {
                "genres"                => "-"
                "keywords"              => "-"
                "credits"               => "-"
                "production_companies"  => "-"
            }
            tag_on_failure => ["_split_failure"]
        }
    }

    # ---------------------------------------------------------------------------
    # STEP 9 — Recast numeric fields to stricter types (movies_clean only)
    # In movies_raw, budget/revenue/runtime are floats (permissive).
    # For movies_clean we cast them to integer — cleaner for aggregations.
    # ---------------------------------------------------------------------------
    if [@metadata][target] == "movies_clean" {
        mutate {
            convert => {
                "budget"  => "integer"
                "revenue" => "integer"
                "runtime" => "integer"
            }
            tag_on_failure => ["_mutate_clean_convert_failure"]
        }
    }
}

# =============================================================================
# OUTPUT — Route documents to movies_raw or movies_clean
# Original events go to movies_raw (raw, unmodified beyond basic type casting).
# Cloned events go to movies_clean (cleaned, split fields, stricter types).
# =============================================================================
output {

  if [@metadata][target] == "movies_clean" {
    # -------------------------------------------------------------------------
    # Route cleaned clone to movies_clean
    # -------------------------------------------------------------------------
    elasticsearch {
      hosts       => ["http://elasticsearch:9200"]
      index       => "movies_clean"
      document_id => "%{id}"
    }

  } else {
    # -------------------------------------------------------------------------
    # Route original event to movies_raw
    # -------------------------------------------------------------------------
    elasticsearch {
      hosts       => ["http://elasticsearch:9200"]
      index       => "movies_raw"
      document_id => "%{id}"
    }

    # One dot per movie — visual progress indicator in Logstash logs
    stdout {
      codec => dots
    }
  }
}